<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mythos Core — დეშბორდი</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="app-page">
  <div class="orb-1" style="opacity:.45"></div>
  <div class="orb-2" style="opacity:.35"></div>
  <div class="stars" style="opacity:.5"></div>
  <div class="top-line"></div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">⚡</div>
      <span>Mythos Core</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item active">
        <span class="nav-icon">🏠</span> სერვერები
      </a>
      <hr class="nav-divider">
      <a href="/logout" class="nav-item logout">
        <span class="nav-icon">🚪</span> გამოსვლა
      </a>
    </nav>
    <div class="sidebar-user" id="userInfo"></div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>სერვერების სია</h1>
      <p>აირჩიეთ სერვერი სამართავად</p>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card red loading">
        <div class="stat-card-top">
          <span class="stat-label">სულ ბილეთები</span>
          <span class="stat-icon">🎫</span>
        </div>
        <div class="stat-value red">—</div>
      </div>
      <div class="stat-card green loading">
        <div class="stat-card-top">
          <span class="stat-label">ღია ბილეთები</span>
          <span class="stat-icon">🟢</span>
        </div>
        <div class="stat-value green">—</div>
      </div>
      <div class="stat-card blue loading">
        <div class="stat-card-top">
          <span class="stat-label">განაცხადები</span>
          <span class="stat-icon">📝</span>
        </div>
        <div class="stat-value blue">—</div>
      </div>
      <div class="stat-card yellow loading">
        <div class="stat-card-top">
          <span class="stat-label">გათამაშებები</span>
          <span class="stat-icon">🎉</span>
        </div>
        <div class="stat-value yellow">—</div>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;color:rgba(255,255,255,.35);font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;">
      <span>📡</span> სერვერები
    </div>

    <div class="guilds-grid" id="guildsGrid">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>სერვერები იტვირთება...</p>
      </div>
    </div>
  </main>

  <script>
    async function init() {
      try {
        const [userRes, guildsRes, statsRes] = await Promise.all([
          fetch('/api/user'),
          fetch('/api/guilds'),
          fetch('/api/stats'),
        ]);
        const user   = await userRes.json();
        const guilds = await guildsRes.json();
        const stats  = await statsRes.json();

        // User info
        document.getElementById('userInfo').innerHTML = `
          <img src="https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=64" alt="avatar" class="user-avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
          <div>
            <div class="user-name">${user.username}</div>
            <div class="user-tag">ადმინი</div>
          </div>
        `;

        // Stats
        document.getElementById('statsRow').innerHTML = `
          <div class="stat-card red">
            <div class="stat-card-top"><span class="stat-label">სულ ბილეთები</span><span class="stat-icon">🎫</span></div>
            <div class="stat-value red">${stats.totalTickets ?? 0}</div>
          </div>
          <div class="stat-card green">
            <div class="stat-card-top"><span class="stat-label">ღია ბილეთები</span><span class="stat-icon">✅</span></div>
            <div class="stat-value green">${stats.openTickets ?? 0}</div>
          </div>
          <div class="stat-card blue">
            <div class="stat-card-top"><span class="stat-label">განაცხადები</span><span class="stat-icon">📝</span></div>
            <div class="stat-value blue">${stats.totalApplications ?? 0}</div>
          </div>
          <div class="stat-card yellow">
            <div class="stat-card-top"><span class="stat-label">გათამაშებები</span><span class="stat-icon">🎉</span></div>
            <div class="stat-value yellow">${stats.activeGiveaways ?? 0}</div>
          </div>
        `;

        // Guilds
        if (!Array.isArray(guilds) || !guilds.length) {
          document.getElementById('guildsGrid').innerHTML = `<div class="empty-state"><p>❌ ადმინ სერვერი ვერ მოიძებნა.</p></div>`;
          return;
        }
        document.getElementById('guildsGrid').innerHTML = guilds.map(g => `
          <a href="/dashboard/${g.id}" class="guild-card">
            <div class="guild-icon">
              ${g.icon
                ? `<img src="https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png?size=64" alt="${g.name}">`
                : `<div class="guild-icon-placeholder">${g.name[0]}</div>`
              }
            </div>
            <div class="guild-info">
              <div class="guild-name">${g.name}</div>
              <div class="guild-id">ID: ${g.id}</div>
            </div>
            <div class="guild-arrow">→</div>
          </a>
        `).join('');
      } catch (e) {
        document.getElementById('guildsGrid').innerHTML = `<div class="empty-state"><p>⚠️ შეცდომა მონაცემების ჩატვირთვისას</p></div>`;
      }
    }
    init();
  </script>
</body>
</html>
